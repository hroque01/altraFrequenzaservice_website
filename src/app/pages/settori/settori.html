<section class="container mx-auto px-6 py-24">
  <h1 class="text-4xl font-bold mb-8">Settori</h1>
  <nav class="flex gap-4 mb-12">
    @for (s of settori; track s.slug) {
      <a [routerLink]="['/settori', s.slug]" class="px-4 py-2 border rounded hover:bg-black/5">{{ s.label }}</a>
    }
  </nav>
  <router-outlet />
</section>
